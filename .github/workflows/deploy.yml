# ══════════════════════════════════════════════════════════════════════
# victor-201.github.io — CI / CD Pipeline
# Standard: devops.skill.md Section 9
#
# Triggers:
#   • Every PR → quality gate (lint + build)
#   • Push to main → quality gate → deploy to Cloudflare Pages
#   • Manual dispatch → rollback job available
# ══════════════════════════════════════════════════════════════════════

name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Step 1: Quality gate ──────────────────────────────────────────
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type-check + Build
        # tsc -b && vite build — both run inside `yarn build`
        run: yarn build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ── Step 2: Deploy to Cloudflare Pages (main only) ────────────────
  deploy:
    name: Deploy → Cloudflare Pages
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: victor-201-github-io
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # branch = 'main' means production deployment
          branch: main

      - name: Verify deployment
        run: |
          echo "✅ Deployment triggered. Cloudflare Pages will propagate within 60s."

  # ── Step 3: Rollback (manual trigger only) ────────────────────────
  rollback:
    name: Rollback (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Instructions
        run: |
          echo "To rollback: go to Cloudflare Pages dashboard → Deployments → find previous deployment → click 'Rollback to this deployment'."
          echo "Or re-run the deploy job with the previous commit SHA."
