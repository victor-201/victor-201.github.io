<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Google Fonts: Be Vietnam Pro -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@800&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
    rel="stylesheet" />
  <title>Nguyễn Văn Thắng — Full-stack Developer</title>
  <style>
    @keyframes fb-load {
      0% { opacity: 0.4; background-position: -200% 0; }
      30% { opacity: 1; background-position: -50% 0; }
      60% { opacity: 0.6; background-position: 100% 0; }
      100% { opacity: 0.4; background-position: 300% 0; }
    }
    img.fb-glass {
      background:
        linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.3) 35%, rgba(255,255,255,0.5) 40%, rgba(255,255,255,0.3) 45%, transparent 60%) 0 0 / 250% 100% no-repeat,
        radial-gradient(ellipse 100% 50% at 50% 0%, rgba(255,255,255,0.1) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 90% 90%, rgba(255,255,255,0.06) 0%, transparent 60%),
        rgba(5,5,10,0.5) !important;
      animation: fb-load 3s ease-in-out infinite !important;
      border-radius: 16px !important;
      outline: 1px solid rgba(255,255,255,0.1) !important;
      outline-offset: -1px !important;
      box-shadow:
        0 25px 60px -16px rgba(0,0,0,0.7),
        0 0 0 1px rgba(255,255,255,0.04),
        inset 0 0 30px rgba(255,255,255,0.02),
        inset 0 1px 0 rgba(255,255,255,0.1) !important;
    }
  </style>
  <script>
    (function() {
      try {
        var theme = localStorage.getItem("theme");
        if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      } catch (e) {
        if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      }
    })();
  </script>
  <script>
    (function() {
      var PIXEL = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
      function makeFallback(img) {
        if (img.getAttribute("src") === PIXEL) return;
        img.setAttribute("src", PIXEL);
        img.className = (img.className || "") + " fb-glass";
        img.style.setProperty("outline", "1px solid rgba(255,255,255,0.12)", "important");
        img.style.setProperty("border-radius", "12px", "important");
        img.style.setProperty("box-shadow", "0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08)", "important");
        img.style.setProperty("min-width", "48px", "important");
        img.style.setProperty("min-height", "48px", "important");
      }
      function fix(img) {
        if (img._fbk) return;
        img._fbk = 1;
        img.onerror = function() { makeFallback(this); };
        if (img.complete && img.naturalWidth === 0) makeFallback(img);
      }
      function scan() { document.querySelectorAll("img").forEach(fix); }
      scan();
      new MutationObserver(scan).observe(document.documentElement, {
        childList: true,
        subtree: true
      });
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <div id="cursor-root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
